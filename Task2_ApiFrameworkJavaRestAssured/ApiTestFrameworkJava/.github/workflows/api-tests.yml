name: API Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment'
        required: false
        default: 'dev'
        type: choice
        options: [dev, qa, staging, prod]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [dev, qa, staging]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew clean test -Denv=${{ matrix.env }} -Dretry.count=2 -Dthread.count=4

      - name: Generate Allure report
        if: always()
        run: ./gradlew allureReport

      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.env }}
          path: build/reports/allure-report

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.env }}
          path: build/test-results
