# dev environment configuration - Restful Booker public playground API
base.url=https://restful-booker.herokuapp.com
thread.count=4
retry.count=2

# Auth: TOKEN | BASIC | OAUTH2 | API_KEY
auth.type=TOKEN
auth.username=admin
auth.password=password123

# OAuth2 client-credentials (Inference: not exposed by Restful Booker, kept for framework extensibility)
oauth2.token.url=https://restful-booker.herokuapp.com/auth
oauth2.client.id=
oauth2.client.secret=
oauth2.scope=

# API key auth (Inference: not exposed by Restful Booker, kept for framework extensibility)
apikey.header.name=x-api-key
apikey.value=
